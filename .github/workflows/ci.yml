# Continuous integration: unit tests (fast) and integration tests (Docker services).
#
# Integration tests expect services from docker-compose.test.yml on localhost.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Start Redis for RedisKVStore parity tests
        run: |
          docker run -d --name ums-redis-unit -p 6379:6379 redis:7-alpine \
            redis-server --save "" --appendonly no
          for i in $(seq 1 45); do
            if docker exec ums-redis-unit redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis is up"
              exit 0
            fi
            sleep 1
          done
          echo "Redis failed to start"; docker logs ums-redis-unit; exit 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run unit tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
        run: pytest tests/unit -v --tb=short -q

      - name: Stop Redis
        if: always()
        run: docker rm -f ums-redis-unit || true

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Elasticsearch: mmap limits. Redis: overcommit helps fork-based workloads on some hosts.
      - name: Tune Linux VM (Elasticsearch + Redis)
        run: |
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w vm.overcommit_memory=1

      - name: Start infrastructure (Redis, Qdrant, Neo4j, Elasticsearch)
        id: compose_up
        # --wait waits for healthchecks; Neo4j/ES can exceed default 60s on CI.
        run: docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 300

      - name: Print compose logs on failure
        if: failure() && steps.compose_up.outcome == 'failure'
        run: docker compose -f docker-compose.test.yml logs --tail 200

      - name: Verify services before pytest
        run: |
          docker compose -f docker-compose.test.yml ps
          docker compose -f docker-compose.test.yml exec -T redis redis-cli ping
          curl -sfS http://127.0.0.1:6333/healthz
          curl -sfS http://127.0.0.1:9200/_cluster/health
          docker compose -f docker-compose.test.yml exec -T neo4j cypher-shell -u neo4j -p password 'RETURN 1 AS ok'

      - name: Run integration tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
          QDRANT_URL: http://127.0.0.1:6333
          NEO4J_URI: bolt://127.0.0.1:7687
          ELASTICSEARCH_URL: http://127.0.0.1:9200
        run: pytest tests/integration -v --tb=short --no-header -q

      - name: Stop infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
