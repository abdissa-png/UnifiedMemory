# Continuous integration: unit tests (fast) and integration tests (Docker services).
#
# Integration tests expect services from docker-compose.test.yml on localhost.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short -q

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Start infrastructure (Redis, Qdrant, Neo4j, Elasticsearch)
        # --wait waits for healthchecks; Neo4j/ES can exceed default 60s on CI.
        run: docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 300

      - name: Run integration tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
          QDRANT_URL: http://127.0.0.1:6333
          NEO4J_URI: bolt://127.0.0.1:7687
          ELASTICSEARCH_URL: http://127.0.0.1:9200
        # Full integration package (Docker-backed tests skip fixtures if unavailable; includes in-memory cases too).
        run: pytest tests/integration -v --tb=short

      - name: Stop infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
