[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "unified-memory-system"
version = "0.1.0"
description = "Unified, multi-tenant, multimodal memory system implementing the UNIFIED_MEMORY_SYSTEM_DESIGN."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "Mufasa", email = "you@example.com" }
]
dependencies = [
  "numpy>=1.26",
  "typing_extensions>=4.10.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "pytest-asyncio>=0.23",
  "mypy>=1.8",
]

[project.urls]
Homepage = "https://example.com/unified-memory-system"

[tool.setuptools.packages.find]
where = ["src"]

